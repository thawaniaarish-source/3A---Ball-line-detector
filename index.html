<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FairCall Ball Line Judge</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
      .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .8rem; }
      input, select, button, textarea { padding: .5rem; width: 100%; }
      button { cursor: pointer; font-weight: 600; }
      pre { background: #101418; color: #99ff99; padding: 1rem; border-radius: 8px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>FairCall Ball Line Judge</h1>
    <p>✅ This page is deployed at <code>/</code> so Vercel always shows a visible app.</p>

    <div class="grid">
      <label>Sport
        <select id="sport"><option>table_tennis</option><option>badminton</option><option>basketball</option><option>tennis</option></select>
      </label>
      <label>Ball radius(px)<input id="r" type="number" value="10" /></label>
      <label>Ball X<input id="x" type="number" value="100" /></label>
      <label>Ball Y<input id="y" type="number" value="100" /></label>
    </div>

    <label>Lines JSON</label>
    <textarea id="lines" rows="5">[{"x1":120,"y1":0,"x2":120,"y2":300}]</textarea>
    <button id="submit">Judge</button>
    <pre id="result">Result will appear here...</pre>

    <script>
      document.getElementById('submit').onclick = async () => {
        const payload = {
          sport: document.getElementById('sport').value,
          x: Number(document.getElementById('x').value),
          y: Number(document.getElementById('y').value),
          r: Number(document.getElementById('r').value),
          lines: JSON.parse(document.getElementById('lines').value)
        };
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        document.getElementById('result').textContent = JSON.stringify(await res.json(), null, 2);
      };
    </script>
  </body>
</html>
