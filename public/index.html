<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FairCall Pro | BMW M Style</title>
  <style>
    :root{--bg:#050608;--panel:#0b0f14;--text:#f5f7fa;--muted:#adb5bf;--blue:#1f84d6;--blue2:#2d6fe8;--red:#ff3b30}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 36px;border-bottom:1px solid #222}
    .brand{font-size:42px;font-weight:800;letter-spacing:1px}.tag{border:1px solid #fff;padding:10px 18px;font-weight:700}
    .stripe{height:6px;background:linear-gradient(90deg,#1f84d6 0 33%,#2d6fe8 33% 66%,#ff3b30 66%)}
    .wrap{padding:28px 36px}.hero{display:grid;grid-template-columns:1.1fr 1fr;gap:26px}
    h1{font-size:72px;line-height:1;margin:0 0 14px;text-transform:uppercase}.desc{font-size:34px;color:var(--muted);margin:0 0 20px}
    .panel{background:var(--panel);padding:22px;border:1px solid #161b22}
    label{display:block;margin:0 0 12px;font-size:15px} input,select,button{width:100%;padding:12px;background:#06090d;color:#fff;border:1px solid #2a2f37}
    button{font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px} .primary{background:#f2f2f2;color:#000;border-color:#f2f2f2}
    .videoBox{background:#090d13;padding:10px;border:1px solid #1a2430} video{width:100%;display:block}
    pre{background:#020913;color:#91f5a0;padding:10px;min-height:110px;overflow:auto}
    .warn{display:none;color:#ff4d4d;font-weight:700;margin-top:10px}
    @media(max-width:980px){.hero{grid-template-columns:1fr}h1{font-size:42px}.desc{font-size:22px}}
  </style>
</head>
<body>
  <div class="nav"><div class="brand">FAIRCALL PRO</div><div class="tag">DISCOVER M</div></div>
  <div class="stripe"></div>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>Ball Line Detector</h1>
        <p class="desc">BMW M-inspired style. Start camera and run Judge Results.</p>
        <img src="/assets/bmw-m-design.svg" alt="BMW M design" style="height:60px;margin-bottom:16px;">
        <div class="panel">
          <label>Sport<select id="sport"><option>table_tennis</option><option>badminton</option><option>basketball</option><option>tennis</option></select></label>
          <label>Ball Radius (mm)<input id="r_mm" type="number" value="10" min="1" /></label>
          <button id="startCam">Start Camera</button>
          <button id="judge" class="primary" style="margin-top:8px;">Judge Results</button>
          <p id="warning" class="warn">Please insert the right photo</p>
          <pre id="result">Result will appear here...</pre>
        </div>
      </div>
      <div class="videoBox">
        <video id="camera" autoplay playsinline muted></video>
        <div class="stripe" style="margin-top:8px"></div>
      </div>
    </section>
  </div>
<script>
const camera = document.getElementById('camera');
const warning = document.getElementById('warning');

document.getElementById('startCam').onclick = async () => {
  warning.style.display = 'none';
  try { camera.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); }
  catch (e) { document.getElementById('result').textContent = `Camera error: ${e.message}`; }
};

document.getElementById('judge').onclick = async () => {
  const vw = camera.videoWidth || 640, vh = camera.videoHeight || 360;
  const payload = {
    sport: sport.value,
    r_mm: Number(r_mm.value),
    x: Math.round(vw * 0.5),
    y: Math.round(vh * 0.5),
    lines: [{x1:Math.round(vw*0.5), y1:0, x2:Math.round(vw*0.5), y2:vh}]
  };
  const res = await fetch('/api/judge', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
  const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  if (!data.touched_line) warning.style.display = 'block'; else warning.style.display = 'none';
};
</script>
</body>
</html>
